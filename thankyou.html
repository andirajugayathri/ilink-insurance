    <style>
       

        .tq-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 30px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
            margin:50px auto;
        }

        .tq-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4285f4, #34a853, #fbbc05, #ea4335);
        }

        .tq-thumbs-up {
            font-size: 48px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .tq-title {
            font-size: 36px;
            font-weight: 700;
            color: #4285f4;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .tq-subtitle {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
            line-height: 1.4;
        }

        .tq-contact-info {
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            font-size: 18px;
            color: #666;
        }

        .tq-phone-icon {
            color: #ea4335;
        }

        .tq-phone-number {
            color: #ea4335;
            font-weight: 700;
            font-size: 22px;
        }

        .tq-cta-button {
            background: linear-gradient(45deg, #4285f4, #5a9fd4);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }

        .tq-cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(66, 133, 244, 0.4);
            background: linear-gradient(45deg, #3367d6, #4285f4);
        }

        .tq-home-icon {
            font-size: 20px;
        }

        .tq-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #4285f4, #34a853);
            margin: 30px auto;
            border-radius: 2px;
        }

        .tq-additional-info {
            color: #666;
            font-size: 14px;
            margin-top: 30px;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .tq-container {
                padding: 40px 30px;
            }

            .tq-title {
                font-size: 28px;
            }

            .tq-subtitle {
                font-size: 18px;
            }

            .tq-phone-number {
                font-size: 20px;
            }

            .tq-cta-button {
                padding: 15px 30px;
                font-size: 16px;
            }
        }
    </style>

<body style="background: #bebebe; margin:auto;">
    <div id="navbar"></div>
    
    <div class="tq-container">
        <div class="tq-thumbs-up">👍</div>

        <h1 class="tq-title">Thank You!</h1>

        <div class="tq-divider"></div>

        <p class="tq-subtitle">One of Our Experts Will Contact You Soon.</p>

        <div class="tq-contact-info">
            <span>We are just a call away</span>
            <span class="tq-phone-icon">📞</span>
            <span class="tq-phone-number"><a style="text-decoration: none; color:#4285f4;" href="tel:1300 170 328">1300 170 328</a></span>
        </div>

        <a href="/" class="tq-cta-button" onclick="goHome()">
            <span class="tq-home-icon">🏠</span>
            Go Back Home
        </a>

        <p class="tq-additional-info">
            Our team of professionals is ready to assist you with your needs.
        </p>
    </div>

    <script>
        function goHome() {
            // Add your home page URL here
            window.history.back() || (window.location.href = '/');
        }

        // Add a subtle entrance animation
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.tq-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(30px)';

            setTimeout(() => {
                container.style.transition = 'all 0.6s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
    <div id="footer"></div>
    <script>
        fetch("../navbar.html")
        .then(response => {
            if (!response.ok) throw new Error("Failed to load navbar.html");
            return response.text();
        })
        .then(data => {
            const navbar = document.getElementById("navbar");
            if (navbar) {
                navbar.innerHTML = data;
                if (typeof highlightActiveLink === "function") {
                    highlightActiveLink();
                }
            } else {
                console.error("Element with ID 'navbar' not found.");
            }
        })
        .catch(err => console.error(err));

    fetch("../footer.html")
        .then(response => {
            if (!response.ok) throw new Error("Failed to load footer.html");
            return response.text();
        })
        .then(data => {
            const footer = document.getElementById("footer");
            if (footer) {
                footer.innerHTML = data;
            } else {
                console.error("Element with ID 'footer' not found.");
            }
        })
        .catch(err => console.error(err));
    </script>
